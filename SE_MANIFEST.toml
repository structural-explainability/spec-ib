# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# spec-ib
# ============================================================

schema = "se-manifest-schema"
schema_url = "https://github.com/structural-explainability/se-manifest-schema/blob/main/manifest-schema.toml"

# === Identity ===

[meta]
purpose = "To make explicit the boundaries, responsibilities, and expectations of this repository relative to others."

[repo]
name = "spec-ib"
org = "structural-explainability"
class = "spec"
kind = "interpretation-boundary"
status = "active"
since = "2025"
summary = "Defines the Interpretation Boundary for structural explainability."

[layer]
space = "SE"
role = "specification"

# === Dependencies ===

[depends]
required = ["structural-explainability/spec-se@v1"]
optional = []

# === Provided artifacts ===

[provides]
artifacts = [
  "README.md",
  "SPEC.md",
  "IDENTIFIERS.md",
  "CONFORMANCE.md",
  "data/spec/requirements.json",
  "data/spec/conformance-checks.json",
  "data/spec/scope-exclusions.json",
]
# === Scope ===

[scope]
includes = [
  "constraints on attaching interpretation to neutral substrate records",
  "non-mutation requirements for interpretation artifacts",
  "admissibility conditions for interpretation attachment",
  "explicit prohibitions on interpretive leakage into substrate structure",
  "structural attribution boundaries for interpretive attachment records",
]

excludes = [
  "domain vocabularies",
  "behavioral models",
  "exchange or interaction mechanisms",
  "causal explanations",
  "epistemic evaluation",
  "normative judgment or enforcement",
  "definition of explanation, evidence, or attestation interfaces",
  "governance artifacts, versioning, or lifecycle rules",
  "canonical encoding specifications",
  "dependency graph definitions",
  "neutral substrate identity or persistence rules",
  "graph evolution semantics",
]

# === Validation ===

[validation]
entrypoint = "uv run se-validate"
export_check_entrypoint = "uv run se-ref-export --check"
reference_entrypoint = "uv run se-ref-validate"
strict_entrypoint = "uv run se-validate --strict"
tag_entrypoint = "uv run python -m se_manifest_schema validate --strict --require-tag"

# === Behavior / governance ===

[naming]
pattern = "spec-*"

[governance]
authority = "structural-explainability"

# === External references ===

[citation]
cff = "CITATION.cff"
preferred = "spec"

[traceability]
identifier_map = "structural-explainability/spec-ib/IDENTIFIERS.md"
