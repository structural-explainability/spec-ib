# ============================================================
# .github/workflows/ci-python.yml (Continuous Integration)
# ============================================================
# Updated: 2026-05-15 SPEC VARIANT
#
# WHY-FILE: Validate repository hygiene, specification consistency,
# generated reference artifacts, and Python correctness.
#
# === COVERAGE ===
#
# COVERED BY PRE-COMMIT - not repeated as explicit steps:
#   - ruff-check (lint with autofix)
#   - ruff-format (formatting)
#   - trailing whitespace, line endings, JSON/TOML/YAML syntax, large files
#
# NOT INCLUDED IN THIS SPEC VARIANT:
#   - Lean checks
#   - Zensical docs build
#
# WHY SEPARATE: These tools are slower, require the full environment,
# or produce output worth seeing in CI logs independently.

name: CI (Python)

on:
  push:
    branches: [main]        # WHY: Validate every push to main.
  pull_request:
    branches: [main]        # WHY: Validate PRs before merge.
  workflow_dispatch:         # WHY: Allow manual trigger from Actions tab.

permissions:
  contents: read             # WHY: Least privilege; CI only reads, never writes.

env:
  PYTHONUNBUFFERED: "1"      # WHY: Real-time log output in CI.
  PYTHONIOENCODING: "utf-8"  # WHY: Consistent encoding across platforms.
  PYTHON_VERSION: "3.15"
  UV_PYTHON: "3.15"

jobs:
  ci:
    name: Repository / Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ============================================================
      # A) ASSEMBLE: Checkout code and set up environment
      # ============================================================

      - name: A1) Checkout repository code
        uses: actions/checkout@v6

      - name: A2) Install uv (with caching)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: A3) Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: A4) Install all dependencies
        run: uv sync --extra dev --extra docs --upgrade

      - name: A5) Show tool versions
        run: |
          uv --version
          uv run python --version

      # ============================================================
      # B) HYGIENE: Repository hygiene checks
      # ============================================================

      - name: B1) Run pre-commit on all files
        run: uv tool run pre-commit run --all-files

      # ============================================================
      # C) SPEC: Specification consistency and generated artifacts
      # ============================================================

      - name: C1) Validate specification consistency
        run: uv run se-validate

      - name: C2) Generate reference/spec artifacts
        run: uv run se-ref-export

      - name: C3) Check generated artifacts are current
        run: uv run se-ref-export --check

      - name: C4) Validate generated reference/spec artifacts
        run: uv run se-ref-validate

      - name: C5) Run strict validation
        run: uv run se-validate --strict

      - name: C6) Ensure generated files are committed
        run: |
          git diff --exit-code || {
            echo "Generated files are out of date. Run se-ref-export and commit the changes."
            exit 1
          }

      # ============================================================
      # D) PYTHON: Type checks and tests
      # ============================================================

      - name: D1) Run Pyright
        run: uv run python -m pyright

      - name: D2) Run pytest
        run: uv run python -m pytest
